services:
  - type: web_service
    name: interviewace-backend
    env: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: MONGODB_URI
        value: REPLACE_WITH_YOUR_MONGODB_URI
      - key: JWT_SECRET
        value: REPLACE_WITH_A_STRONG_SECRET
      - key: NODE_ENV
        value: production
      - key: FRONTEND_URL
        value: https://interviewace-frontend.onrender.com

  - type: static_site
    name: interviewace-frontend
    env: static
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    publishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://interviewace-backend.onrender.com/api
