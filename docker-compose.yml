version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: interviewace-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: password
      MONGO_INITDB_DATABASE: interviewace
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - interviewace-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: interviewace-backend
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: development
      PORT: 5000
      MONGODB_URI: mongodb://root:password@mongodb:27017/interviewace?authSource=admin
      JWT_SECRET: your_super_secret_jwt_key_change_this
    depends_on:
      mongodb:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - interviewace-network
    command: npm run dev

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: http://localhost:5000/api
    container_name: interviewace-frontend
    ports:
      - "3000:3000"
    environment:
      VITE_API_BASE_URL: http://localhost:5000/api
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - interviewace-network

volumes:
  mongodb_data:

networks:
  interviewace-network:
    driver: bridge
